<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#667eea">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>수학 놀이터 🌟</title>
<link rel="manifest" href="manifest.json">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --primary: #667eea;
    --secondary: #764ba2;
    --add: #11998e;
    --sub: #ee0979;
    --mul: #f7971e;
    --div: #396afc;
    --times: #8e2de2;
    --success: #00b09b;
    --wrong: #f85032;
  }

  body {
    font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    min-height: 100vh;
    min-height: -webkit-fill-available;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── SCREENS ── */
  .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 480px; padding: 20px 16px; min-height: 100vh; }
  .screen.active { display: flex; }

  /* ── HOME ── */
  #home { justify-content: center; gap: 24px; }
  .app-title { font-size: 2.6rem; font-weight: 900; color: #fff; text-shadow: 0 4px 12px rgba(0,0,0,.3); text-align: center; line-height: 1.2; }
  .app-sub { font-size: 1.1rem; color: rgba(255,255,255,.85); text-align: center; }
  .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; }
  .menu-btn {
    border: none; border-radius: 20px; padding: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
    font-size: 1.1rem; font-weight: 900; color: #fff; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.3);
    transition: transform .15s, box-shadow .15s;
    position: relative; overflow: hidden; height: 160px;
    text-shadow: 0 2px 8px rgba(0,0,0,.7);
  }
  .menu-btn:active { transform: scale(.95); box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .menu-btn img.char-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center top;
    filter: brightness(.85);
  }
  .menu-btn .label {
    position: relative; z-index: 1;
    background: rgba(0,0,0,.45); width: 100%;
    padding: 8px 6px; text-align: center; font-size: 1rem; font-weight: 900;
    backdrop-filter: blur(4px);
  }
  .menu-btn.add-btn  { background: linear-gradient(135deg,#f7971e,#ffd200); }
  .menu-btn.sub-btn  { background: linear-gradient(135deg,#1565c0,#42a5f5); }
  .menu-btn.mul-btn  { background: linear-gradient(135deg,#212121,#616161); }
  .menu-btn.div-btn  { background: linear-gradient(135deg,#b0bec5,#eceff1); }
  .menu-btn.times-btn{ background: linear-gradient(135deg,#8e2de2,#4a00e0); grid-column: span 2; height: 140px; }
  .menu-btn.times-btn img.char-img { object-fit: contain; object-position: center center; transform: scale(0.75); filter: brightness(.9); }

  .stars-bar { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,.15); border-radius: 40px; padding: 10px 20px; }
  .stars-bar .star-count { font-size: 1.4rem; font-weight: 900; color: #fff; }
  .stars-bar .star-label { font-size: 0.9rem; color: rgba(255,255,255,.8); }

  /* ── DIAMOND ── */
  @keyframes colorCycle {
    0%   { background: #ff3366; box-shadow: 0 0 10px #ff3366, 0 0 20px #ff336688; }
    14%  { background: #ff8800; box-shadow: 0 0 10px #ff8800, 0 0 20px #ff880088; }
    28%  { background: #ffdd00; box-shadow: 0 0 10px #ffdd00, 0 0 20px #ffdd0088; }
    42%  { background: #00dd44; box-shadow: 0 0 10px #00dd44, 0 0 20px #00dd4488; }
    57%  { background: #00ccff; box-shadow: 0 0 10px #00ccff, 0 0 20px #00ccff88; }
    71%  { background: #6644ff; box-shadow: 0 0 10px #6644ff, 0 0 20px #6644ff88; }
    85%  { background: #ff00cc; box-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc88; }
    100% { background: #ff3366; box-shadow: 0 0 10px #ff3366, 0 0 20px #ff336688; }
  }
  /* 외부 컨테이너: 레이아웃 기준 */
  .diamond {
    display: inline-flex; align-items: center; justify-content: center;
    vertical-align: middle;
  }
  /* 실제 다이아몬드 모양 */
  .diamond::before {
    content: '';
    display: block;
    background: #ff3366;
    border-radius: 3px;
    animation: colorCycle 7s linear infinite;
  }
  /* 크기 변형 */
  .diamond.lg::before { width: 28px; height: 28px; transform: rotate(45deg); }
  .diamond.md::before { width: 18px; height: 18px; transform: rotate(45deg); }
  .diamond.sm::before { width: 13px; height: 13px; transform: rotate(45deg); }
  /* 애니메이션 딜레이로 여러 개일 때 색이 다르게 */
  .diamond:nth-child(2)::before  { animation-delay: -1s; }
  .diamond:nth-child(3)::before  { animation-delay: -2s; }
  .diamond:nth-child(4)::before  { animation-delay: -3s; }
  .diamond:nth-child(5)::before  { animation-delay: -4s; }
  .diamond:nth-child(6)::before  { animation-delay: -5s; }
  .diamond:nth-child(7)::before  { animation-delay: -6s; }
  .diamond:nth-child(8)::before  { animation-delay: -1.5s; }
  .diamond:nth-child(9)::before  { animation-delay: -2.5s; }
  .diamond:nth-child(10)::before { animation-delay: -3.5s; }

  /* ── QUIZ SCREEN ── */
  #quiz { justify-content: flex-start; padding-top: 16px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 16px; }
  .back-btn { background: rgba(255,255,255,.2); border: none; border-radius: 50%; width: 44px; height: 44px; color: #fff; font-size: 1.3rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .score-pill { background: rgba(255,255,255,.2); border-radius: 20px; padding: 6px 16px; color: #fff; font-weight: 700; font-size: 1rem; }

  .progress-wrap { width: 100%; background: rgba(255,255,255,.2); border-radius: 8px; height: 10px; margin-bottom: 20px; }
  .progress-bar { height: 10px; border-radius: 8px; background: #ffd700; transition: width .4s; }

  .question-card {
    background: #fff; border-radius: 28px; padding: 32px 24px; width: 100%;
    text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,.15);
    margin-bottom: 20px;
  }
  .q-label { font-size: 0.9rem; color: #999; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
  .q-text { font-size: 3rem; font-weight: 900; color: #333; margin-bottom: 4px; }
  .feedback-area { height: 36px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; font-weight: 700; }
  .feedback-area.ok  { color: var(--success); }
  .feedback-area.bad { color: var(--wrong); }

  .choices-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }
  .choice-btn {
    background: #fff; border: 3px solid transparent; border-radius: 18px;
    padding: 18px 10px; font-size: 1.8rem; font-weight: 900; color: #333;
    cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.1);
    transition: transform .1s, box-shadow .1s;
  }
  .choice-btn:active { transform: scale(.93); }
  .choice-btn.correct { background: #e8fff8; border-color: var(--success); color: var(--success); }
  .choice-btn.wrong   { background: #fff0ee; border-color: var(--wrong);   color: var(--wrong); }

  /* number input mode */
  .answer-display { background: #fff; border-radius: 20px; width: 100%; padding: 20px; text-align: center; margin-bottom: 16px; box-shadow: 0 4px 14px rgba(0,0,0,.1); }
  .answer-display .answer-text { font-size: 3.5rem; font-weight: 900; color: #333; min-height: 58px; letter-spacing: 4px; }
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
  .key-btn {
    background: #fff; border: none; border-radius: 16px; padding: 16px 10px;
    font-size: 1.7rem; font-weight: 800; color: #444; cursor: pointer;
    box-shadow: 0 3px 10px rgba(0,0,0,.1);
    transition: transform .1s;
  }
  .key-btn:active { transform: scale(.92); background: #f0f0f0; }
  .key-btn.del { background: #ffe5e5; color: #f85032; }
  .key-btn.ok  { background: linear-gradient(135deg,#11998e,#38ef7d); color: #fff; }

  /* ── RESULT ── */
  #result { justify-content: center; gap: 20px; text-align: center; }
  .result-emoji { font-size: 5rem; animation: bounce 0.6s ease infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-16px); } }
  .result-title { font-size: 2rem; font-weight: 900; color: #fff; }
  .result-sub { font-size: 1.1rem; color: rgba(255,255,255,.85); }
  .result-stars { font-size: 2.5rem; letter-spacing: 4px; }
  .result-card { background: #fff; border-radius: 24px; padding: 24px 20px; width: 100%; max-width: 340px; }
  .result-row { display: flex; justify-content: space-between; font-size: 1.1rem; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
  .result-row:last-child { border: none; font-weight: 900; color: var(--primary); }
  .result-actions { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 320px; }
  .btn-retry, .btn-home {
    border: none; border-radius: 16px; padding: 16px; font-size: 1.1rem; font-weight: 700; cursor: pointer;
    transition: transform .1s;
  }
  .btn-retry:active, .btn-home:active { transform: scale(.96); }
  .btn-retry { background: #fff; color: var(--primary); box-shadow: 0 4px 14px rgba(0,0,0,.15); }
  .btn-home  { background: rgba(255,255,255,.2); color: #fff; }

  /* ── TIMES TABLE SCREEN ── */
  #times-select { justify-content: flex-start; padding-top: 16px; gap: 16px; }
  #times-select h2 { font-size: 1.6rem; font-weight: 900; color: #fff; }
  .times-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; }
  .times-card {
    background: #fff; border-radius: 20px; padding: 20px 10px; text-align: center;
    font-size: 1.8rem; font-weight: 900; cursor: pointer;
    box-shadow: 0 4px 14px rgba(0,0,0,.12);
    transition: transform .1s;
  }
  .times-card:active { transform: scale(.93); }
  .times-card span { display: block; font-size: 0.75rem; font-weight: 600; color: #999; margin-top: 4px; }

  /* ── TIMES QUIZ ── */
  #times-quiz { justify-content: flex-start; padding-top: 16px; }

  /* ── DIAMOND BURST ── */
  .star-burst {
    position: fixed; pointer-events: none; z-index: 999;
    width: 28px; height: 28px;
    background: #ffdd00; border-radius: 4px;
    transform: rotate(45deg);
    animation: burst 0.8s ease-out forwards, colorCycle 7s linear infinite;
  }
  @keyframes burst {
    0%   { transform: rotate(45deg) scale(0) translateY(0); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: rotate(45deg) scale(1.8) translateY(-60px); opacity: 0; }
  }

  /* ── DOTS VISUALIZATION ── */
  .dots-area {
    min-height: 60px; display: flex; flex-wrap: wrap;
    align-items: center; justify-content: center;
    gap: 8px; margin: 8px 0 4px; padding: 8px;
    background: #f8f8f8; border-radius: 16px;
  }
  .dots-area:empty { display: none; }
  .dots-group { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; align-items: center; }
  .dots-sep { font-size: 1.8rem; color: #aaa; font-weight: 900; margin: 0 6px; }
  .dot {
    width: 24px; height: 24px; border-radius: 50%;
    display: inline-block;
    animation: dotPop .2s ease both;
  }
  @keyframes dotPop {
    0%   { transform: scale(0); opacity: 0; }
    70%  { transform: scale(1.3); }
    100% { transform: scale(1); opacity: 1; }
  }
  .dot-a  { background: #11998e; box-shadow: 0 2px 6px rgba(17,153,142,.4); }
  .dot-b  { background: #ee0979; box-shadow: 0 2px 6px rgba(238,9,121,.4); }
  .dot-dim{ background: #ccc; }
  /* grid layout for multiplication */
  .dots-grid { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .dots-grid-row { display: flex; gap: 6px; }

  /* ── DIFFICULTY SELECTOR ── */
  .diff-row { display: flex; gap: 10px; width: 100%; }
  .diff-btn {
    flex: 1; border: none; border-radius: 14px; padding: 12px 6px;
    font-size: 0.95rem; font-weight: 700; cursor: pointer; color: #fff;
    opacity: .55; transition: opacity .15s, transform .1s;
  }
  .diff-btn.active { opacity: 1; transform: scale(1.05); }
  .diff-btn.easy { background: #38ef7d; color: #006644; }
  .diff-btn.mid  { background: #f7971e; }
  .diff-btn.hard { background: #f85032; }
</style>
</head>
<body>

<!-- ────── HOME ────── -->
<div id="home" class="screen active">
  <div class="app-title">🌟 수학 놀이터</div>
  <div class="app-sub">재미있게 수학을 배워요!</div>

  <div class="stars-bar">
    <span class="diamond lg"></span>
    <span class="star-count" id="total-stars">0</span>
    <span class="star-label">개 모았어요</span>
  </div>

  <div class="menu-grid">
    <button class="menu-btn add-btn" onclick="startQuiz('add')">
      <img class="char-img" src="img/Super_Sonic.jpeg" alt="" onerror="this.style.display='none'">
      <span class="label">➕ 더하기</span>
    </button>
    <button class="menu-btn sub-btn" onclick="startQuiz('sub')">
      <img class="char-img" src="img/sonic.jpeg" alt="" onerror="this.style.display='none'">
      <span class="label">➖ 빼기</span>
    </button>
    <button class="menu-btn mul-btn" onclick="startQuiz('mul')">
      <img class="char-img" src="img/Shadow.jpeg" alt="" onerror="this.style.display='none'">
      <span class="label">✖️ 곱하기</span>
    </button>
    <button class="menu-btn div-btn" onclick="startQuiz('div')">
      <img class="char-img" src="img/Silver.jpeg" alt="" onerror="this.style.display='none'">
      <span class="label">➗ 나누기</span>
    </button>
    <button class="menu-btn times-btn" onclick="showScreen('times-select')">
      <img class="char-img" src="img/Super_Shadow.jpeg" alt="" onerror="this.style.display='none'">
      <span class="label">📖 구구단 외우기</span>
    </button>
  </div>
</div>

<!-- ────── QUIZ ────── -->
<div id="quiz" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="goHome()">←</button>
    <div id="quiz-title" style="color:#fff;font-weight:800;font-size:1.1rem;"></div>
    <div class="score-pill"><span class="diamond sm"></span> <span id="quiz-stars">0</span></div>
  </div>

  <div class="diff-row">
    <button class="diff-btn easy active" onclick="setDiff('easy',this)">쉬움 😊</button>
    <button class="diff-btn mid"         onclick="setDiff('mid',this)">보통 🤔</button>
    <button class="diff-btn hard"        onclick="setDiff('hard',this)">어려움 🔥</button>
  </div>

  <div class="progress-wrap" style="margin-top:14px;">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div class="question-card">
    <div class="q-label" id="q-num">문제 1 / 10</div>
    <div class="q-text" id="q-text">?</div>
    <div class="dots-area" id="dots-area"></div>
    <div class="feedback-area" id="feedback"></div>
  </div>

  <div class="choices-grid" id="choices-area"></div>
</div>

<!-- ────── TIMES TABLE SELECT ────── -->
<div id="times-select" class="screen">
  <div class="top-bar" style="width:100%">
    <button class="back-btn" onclick="goHome()">←</button>
    <div style="color:#fff;font-weight:800;font-size:1.1rem;">구구단 고르기</div>
    <div style="width:44px"></div>
  </div>
  <h2 style="color:#fff;text-align:center;">몇 단을 연습할까요?</h2>
  <div class="times-grid" id="times-grid"></div>
</div>

<!-- ────── TIMES QUIZ ────── -->
<div id="times-quiz" class="screen">
  <div class="top-bar">
    <button class="back-btn" onclick="showScreen('times-select')">←</button>
    <div id="tq-title" style="color:#fff;font-weight:800;font-size:1.1rem;"></div>
    <div class="score-pill"><span class="diamond sm"></span> <span id="tq-stars">0</span></div>
  </div>

  <div class="progress-wrap" style="margin-top:4px;">
    <div class="progress-bar" id="tq-progress" style="width:0%"></div>
  </div>

  <div class="question-card">
    <div class="q-label" id="tq-num">문제 1 / 9</div>
    <div class="q-text" id="tq-text">?</div>
    <div class="dots-area" id="tq-dots-area"></div>
    <div class="feedback-area" id="tq-feedback"></div>
  </div>

  <div class="answer-display">
    <div class="answer-text" id="tq-input">_</div>
  </div>

  <div class="keypad">
    <button class="key-btn" onclick="tqKey('1')">1</button>
    <button class="key-btn" onclick="tqKey('2')">2</button>
    <button class="key-btn" onclick="tqKey('3')">3</button>
    <button class="key-btn" onclick="tqKey('4')">4</button>
    <button class="key-btn" onclick="tqKey('5')">5</button>
    <button class="key-btn" onclick="tqKey('6')">6</button>
    <button class="key-btn" onclick="tqKey('7')">7</button>
    <button class="key-btn" onclick="tqKey('8')">8</button>
    <button class="key-btn" onclick="tqKey('9')">9</button>
    <button class="key-btn del" onclick="tqDel()">⌫</button>
    <button class="key-btn" onclick="tqKey('0')">0</button>
    <button class="key-btn ok" onclick="tqSubmit()">✓</button>
  </div>
</div>

<!-- ────── RESULT ────── -->
<div id="result" class="screen">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-title" id="result-title">잘했어요!</div>
  <div class="result-stars" id="result-stars">⭐⭐⭐</div>
  <div class="result-card">
    <div class="result-row"><span>맞은 문제</span><span id="r-correct">0개</span></div>
    <div class="result-row"><span>틀린 문제</span><span id="r-wrong">0개</span></div>
    <div class="result-row"><span>획득한 다이아</span><span id="r-stars">0 <span class="diamond sm"></span></span></div>
    <div class="result-row"><span>누적 다이아</span><span id="r-total">0 <span class="diamond sm"></span></span></div>
  </div>
  <div class="result-sub" id="result-msg"></div>
  <div class="result-actions">
    <button class="btn-retry" id="btn-retry" onclick="retryQuiz()">🔄 한 번 더!</button>
    <button class="btn-home" onclick="goHome()">🏠 처음으로</button>
  </div>
</div>

<script>
// ── Dot visualization ──
function makeDot(cls, delay) {
  const d = document.createElement('span');
  d.className = 'dot ' + cls;
  d.style.animationDelay = delay + 'ms';
  return d;
}

function renderDots(op, a, b) {
  const area = document.getElementById('dots-area');
  area.innerHTML = '';
  const MAX = 25;

  if (op === 'add') {
    if (a + b > MAX) return;
    const gA = document.createElement('div'); gA.className = 'dots-group';
    const gB = document.createElement('div'); gB.className = 'dots-group';
    for (let i=0;i<a;i++) gA.appendChild(makeDot('dot-a', i*15));
    for (let i=0;i<b;i++) gB.appendChild(makeDot('dot-b', (a+i)*15));
    const sep = document.createElement('span'); sep.className='dots-sep'; sep.textContent='+';
    area.appendChild(gA); area.appendChild(sep); area.appendChild(gB);

  } else if (op === 'sub') {
    if (a > MAX) return;
    const g = document.createElement('div'); g.className = 'dots-group';
    for (let i=0;i<a;i++) g.appendChild(makeDot(i < a-b ? 'dot-a' : 'dot-dim', i*15));
    area.appendChild(g);

  } else if (op === 'mul') {
    if (a*b > MAX || a > 9 || b > 9) return;
    const grid = document.createElement('div'); grid.className = 'dots-grid';
    for (let r=0;r<a;r++) {
      const row = document.createElement('div'); row.className='dots-grid-row';
      for (let c=0;c<b;c++) row.appendChild(makeDot('dot-a', (r*b+c)*20));
      grid.appendChild(row);
    }
    area.appendChild(grid);

  } else if (op === 'div') {
    // answer = a/b → show `answer` groups of `b` dots
    const ans = a / b;
    if (a > MAX || b > 9) return;
    const colors = ['dot-a','dot-b'];
    for (let g=0;g<ans;g++) {
      const grp = document.createElement('div'); grp.className='dots-group';
      grp.style.background='rgba(0,0,0,.04)';
      grp.style.borderRadius='10px'; grp.style.padding='4px';
      for (let i=0;i<b;i++) grp.appendChild(makeDot(colors[g%2], (g*b+i)*20));
      area.appendChild(grp);
    }
  }
}

function renderTimeDots(n, m) {
  const area = document.getElementById('tq-dots-area');
  area.innerHTML = '';
  if (n*m > 25 || n > 9 || m > 9) return;
  const grid = document.createElement('div'); grid.className = 'dots-grid';
  for (let r=0;r<n;r++) {
    const row = document.createElement('div'); row.className='dots-grid-row';
    for (let c=0;c<m;c++) row.appendChild(makeDot('dot-a', (r*m+c)*20));
    grid.appendChild(row);
  }
  area.appendChild(grid);
}

// ── State ──
let totalStars = +localStorage.getItem('math-stars') || 0;
let currentOp = 'add';
let currentDiff = 'easy';
let questions = [];
let qIdx = 0;
let sessionStars = 0;
let sessionCorrect = 0;
let locked = false;
let lastRetryFn = null;

// Times table
let timesN = 2;
let tqQuestions = [];
let tqIdx = 0;
let tqStars = 0;
let tqCorrect = 0;
let tqInput = '';
let tqLocked = false;

const TOTAL_Q = 10;

// ── Helpers ──
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function shuffle(a) { for (let i=a.length-1;i>0;i--){const j=rand(0,i);[a[i],a[j]]=[a[j],a[i]];} return a; }

function saveStars() {
  localStorage.setItem('math-stars', totalStars);
  document.getElementById('total-stars').textContent = totalStars;
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() {
  saveStars();
  showScreen('home');
}

// ── Difficulty limits ──
function diffLimits(op) {
  const d = currentDiff;
  if (op === 'add') return d==='easy'?[1,9,1,9]:d==='mid'?[1,19,1,19]:[1,99,1,99];
  if (op === 'sub') return d==='easy'?[1,9,1,9]:d==='mid'?[1,19,1,19]:[1,99,1,99];
  if (op === 'mul') return d==='easy'?[1,5,1,5]:d==='mid'?[1,9,1,9]:[1,12,1,12];
  if (op === 'div') return d==='easy'?[1,5,1,5]:d==='mid'?[1,9,1,9]:[1,12,1,12];
}

// ── Generate question ──
function makeQuestion(op) {
  const lim = diffLimits(op);
  let a, b, answer, text;
  if (op === 'add') {
    a = rand(lim[0], lim[1]); b = rand(lim[2], lim[3]);
    answer = a + b; text = `${a} + ${b} = ?`;
  } else if (op === 'sub') {
    a = rand(lim[0], lim[1]); b = rand(lim[2], lim[3]);
    if (a < b) [a,b]=[b,a]; // no negatives
    answer = a - b; text = `${a} - ${b} = ?`;
  } else if (op === 'mul') {
    a = rand(lim[0], lim[1]); b = rand(lim[2], lim[3]);
    answer = a * b; text = `${a} × ${b} = ?`;
  } else { // div
    b = rand(lim[2], lim[3]); answer = rand(lim[0], lim[1]); a = b * answer;
    text = `${a} ÷ ${b} = ?`;
  }
  // 4 choices
  const choices = new Set([answer]);
  while (choices.size < 4) {
    const delta = rand(-Math.max(3,Math.floor(answer*0.4)), Math.max(3,Math.floor(answer*0.4)));
    const c = answer + delta;
    if (c >= 0 && c !== answer) choices.add(c);
  }
  return { text, answer, choices: shuffle([...choices]), a, b };
}

// ── Start Quiz ──
function startQuiz(op) {
  currentOp = op;
  const labels = { add:'➕ 더하기', sub:'➖ 빼기', mul:'✖️ 곱하기', div:'➗ 나누기' };
  document.getElementById('quiz-title').textContent = labels[op];
  sessionStars = 0; sessionCorrect = 0; qIdx = 0; locked = false;
  document.getElementById('quiz-stars').textContent = 0;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.diff-btn.easy').classList.add('active');
  currentDiff = 'easy';
  questions = Array.from({length:TOTAL_Q}, () => makeQuestion(op));
  lastRetryFn = () => startQuiz(op);
  showScreen('quiz');
  renderQuestion();
}

function setDiff(d, btn) {
  currentDiff = d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  // regen remaining questions
  questions = questions.slice(0, qIdx).concat(Array.from({length:TOTAL_Q-qIdx}, ()=>makeQuestion(currentOp)));
  renderQuestion();
}

function renderQuestion() {
  if (qIdx >= TOTAL_Q) { showResult(); return; }
  const q = questions[qIdx];
  document.getElementById('q-num').textContent = `문제 ${qIdx+1} / ${TOTAL_Q}`;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback-area';
  renderDots(currentOp, q.a, q.b);
  document.getElementById('progress-bar').style.width = (qIdx/TOTAL_Q*100)+'%';

  const area = document.getElementById('choices-area');
  area.innerHTML = '';
  locked = false;
  q.choices.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = c;
    btn.onclick = () => chooseAnswer(c, btn, q.answer);
    area.appendChild(btn);
  });
}

function chooseAnswer(val, btn, answer) {
  if (locked) return;
  locked = true;
  const fb = document.getElementById('feedback');
  if (val === answer) {
    btn.classList.add('correct');
    fb.textContent = '🎉 정답!'; fb.className = 'feedback-area ok';
    sessionCorrect++; sessionStars++;
    totalStars++; saveStars();
    document.getElementById('quiz-stars').textContent = sessionStars;
    spawnStar(btn);
  } else {
    btn.classList.add('wrong');
    fb.textContent = `💪 정답은 ${answer}이에요`; fb.className = 'feedback-area bad';
    // highlight correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (+b.textContent === answer) b.classList.add('correct');
    });
  }
  setTimeout(() => { qIdx++; renderQuestion(); }, 1000);
}

// ── Result ──
function showResult() {
  document.getElementById('progress-bar').style.width = '100%';
  const wrong = TOTAL_Q - sessionCorrect;
  const pct = sessionCorrect / TOTAL_Q;
  let emoji, title, msg;
  if (pct === 1)       { emoji='🏆'; title='완벽해요!'; msg='10개 모두 맞혔어요! 최고!'; }
  else if (pct >= 0.8) { emoji='🎉'; title='잘했어요!'; msg='거의 다 맞혔어요!'; }
  else if (pct >= 0.5) { emoji='😊'; title='좋아요!'; msg='더 연습하면 더 잘할 수 있어요!'; }
  else                  { emoji='💪'; title='파이팅!'; msg='다시 도전해봐요!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-stars').innerHTML = '<span class="diamond md"></span> '.repeat(Math.min(sessionStars,10));
  document.getElementById('r-correct').textContent = sessionCorrect+'개';
  document.getElementById('r-wrong').textContent = wrong+'개';
  document.getElementById('r-stars').innerHTML = sessionStars+' <span class="diamond sm"></span>';
  document.getElementById('r-total').innerHTML = totalStars+' <span class="diamond sm"></span>';
  document.getElementById('result-msg').textContent = msg;
  showScreen('result');
}

function retryQuiz() { if (lastRetryFn) lastRetryFn(); }

// ── Times Table ──
function buildTimesGrid() {
  const grid = document.getElementById('times-grid');
  grid.innerHTML = '';
  for (let n=2; n<=9; n++) {
    const card = document.createElement('div');
    card.className = 'times-card';
    card.innerHTML = `${n}단<span>${n}×1 ~ ${n}×9</span>`;
    card.style.color = ['#11998e','#ee0979','#f7971e','#396afc','#8e2de2','#38ef7d','#f85032','#667eea'][n-2];
    card.onclick = () => startTimesQuiz(n);
    grid.appendChild(card);
  }
}

function startTimesQuiz(n) {
  timesN = n;
  tqIdx = 0; tqStars = 0; tqCorrect = 0; tqInput = ''; tqLocked = false;
  document.getElementById('tq-title').textContent = `📖 ${n}단`;
  document.getElementById('tq-stars').textContent = 0;
  // shuffle multipliers 1-9
  tqQuestions = shuffle([1,2,3,4,5,6,7,8,9]).map(m => ({
    text: `${n} × ${m} = ?`, answer: n*m, multiplier: m
  }));
  lastRetryFn = () => startTimesQuiz(n);
  showScreen('times-quiz');
  renderTQ();
}

function renderTQ() {
  if (tqIdx >= 9) { showTimesResult(); return; }
  const q = tqQuestions[tqIdx];
  document.getElementById('tq-num').textContent = `문제 ${tqIdx+1} / 9`;
  document.getElementById('tq-text').textContent = q.text;
  document.getElementById('tq-feedback').textContent = '';
  document.getElementById('tq-feedback').className = 'feedback-area';
  renderTimeDots(timesN, q.multiplier);
  document.getElementById('tq-progress').style.width = (tqIdx/9*100)+'%';
  tqInput = ''; renderTQInput(); tqLocked = false;
}

function renderTQInput() {
  const el = document.getElementById('tq-input');
  el.textContent = tqInput || '_';
}

function tqKey(k) {
  if (tqLocked) return;
  if (tqInput.length >= 3) return;
  tqInput += k; renderTQInput();
}
function tqDel() { if (tqLocked) return; tqInput = tqInput.slice(0,-1); renderTQInput(); }

function tqSubmit() {
  if (tqLocked || !tqInput) return;
  tqLocked = true;
  const q = tqQuestions[tqIdx];
  const val = parseInt(tqInput);
  const fb = document.getElementById('tq-feedback');
  if (val === q.answer) {
    fb.textContent = '🎉 정답!'; fb.className = 'feedback-area ok';
    tqCorrect++; tqStars++; totalStars++; saveStars();
    document.getElementById('tq-stars').textContent = tqStars;
    spawnStar(document.getElementById('tq-input'));
  } else {
    fb.textContent = `💪 정답은 ${q.answer}이에요`; fb.className = 'feedback-area bad';
    document.getElementById('tq-input').textContent = q.answer;
  }
  setTimeout(() => { tqIdx++; renderTQ(); }, 1200);
}

function showTimesResult() {
  document.getElementById('tq-progress').style.width = '100%';
  const wrong = 9 - tqCorrect;
  const pct = tqCorrect / 9;
  let emoji, title, msg;
  if (pct === 1)       { emoji='🏆'; title='완벽해요!'; msg=`${timesN}단 완전 정복!`; }
  else if (pct >= 0.8) { emoji='🎉'; title='잘했어요!'; msg='거의 다 외웠어요!'; }
  else if (pct >= 0.5) { emoji='😊'; title='좋아요!'; msg='조금만 더 연습해요!'; }
  else                  { emoji='💪'; title='파이팅!'; msg='다시 도전해봐요!'; }

  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-title').textContent = title;
  document.getElementById('result-stars').innerHTML = '<span class="diamond md"></span> '.repeat(Math.min(tqStars,9));
  document.getElementById('r-correct').textContent = tqCorrect+'개';
  document.getElementById('r-wrong').textContent = wrong+'개';
  document.getElementById('r-stars').innerHTML = tqStars+' <span class="diamond sm"></span>';
  document.getElementById('r-total').innerHTML = totalStars+' <span class="diamond sm"></span>';
  document.getElementById('result-msg').textContent = msg;
  showScreen('result');
}

// ── Star burst animation ──
function spawnStar(refEl) {
  const rect = refEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'star-burst';
  // 랜덤 색상 딜레이로 다양한 색이 튀어오르게
  el.style.animationDelay = `-${Math.random()*7}s, -${Math.random()*7}s`;
  el.style.left = (rect.left + rect.width/2 - 14) + 'px';
  el.style.top  = rect.top + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 850);
}

// ── Init ──
buildTimesGrid();
document.getElementById('total-stars').textContent = totalStars;

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
