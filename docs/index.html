<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#38bdf8">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="StockApp">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.svg">
<title>Stock Dashboard</title>
<style>
:root {
  --bg:     #0f172a;
  --bg2:    #1e293b;
  --bg3:    #334155;
  --text:   #e2e8f0;
  --text2:  #94a3b8;
  --accent: #38bdf8;
  --green:  #22c55e;
  --yellow: #f59e0b;
  --red:    #ef4444;
  --border: #334155;
  --r:      12px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;font-size:14px;line-height:1.5}
body{display:flex;flex-direction:column;overflow:hidden}

/* ── 헤더 */
.hdr{background:var(--bg2);padding:12px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.hdr-row{display:flex;justify-content:space-between;align-items:center}
.hdr-title{font-size:17px;font-weight:700;color:var(--accent)}
.hdr-meta{font-size:11px;color:var(--text2);text-align:right}
.hdr-date{color:var(--text);font-weight:600}

/* ── 탭 바 */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.tab{flex:1;padding:10px 4px;text-align:center;font-size:12px;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}

/* ── 스크롤 영역 */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{display:none;padding:12px}
.page.active{display:block}

/* ── 공통 카드 */
.card{background:var(--bg2);border-radius:var(--r);padding:14px;margin-bottom:12px;border:1px solid var(--border)}
.card-title{font-size:14px;font-weight:600;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.muted{color:var(--text2)}
.empty{text-align:center;padding:32px;color:var(--text2);font-size:13px}

/* ── 배지 */
.badge{display:inline-block;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600}
.bg-green{background:rgba(34,197,94,.2);color:var(--green);border:1px solid var(--green)}
.bg-red{background:rgba(239,68,68,.2);color:var(--red);border:1px solid var(--red)}
.bg-yellow{background:rgba(245,158,11,.2);color:var(--yellow);border:1px solid var(--yellow)}
.bg-gray{background:rgba(148,163,184,.15);color:var(--text2);border:1px solid var(--border)}

/* ── 새로고침 버튼 */
.refresh-btn{background:var(--bg3);border:none;color:var(--accent);padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.refresh-btn:active{opacity:.7}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 로딩 */
.loading{text-align:center;padding:40px;color:var(--text2)}
.loading-dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.2s ease-in-out infinite}
.loading-dot:nth-child(2){animation-delay:.2s}
.loading-dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,80%,100%{transform:scale(0);opacity:.5}40%{transform:scale(1);opacity:1}}

/* ══════════════════════════════
   탭1: 추세추종
══════════════════════════════ */

/* 지정학 리스크 */
.geo-grid{display:grid;grid-template-columns:100px 1fr;gap:12px;align-items:start}
.gauge-wrap{text-align:center}
.gauge-val{font-size:32px;font-weight:700;line-height:1}
.gauge-sub{font-size:11px;color:var(--text2);margin-top:2px}
.gauge-arc{width:80px;height:48px;margin:0 auto 6px}
.geo-info{}
.geo-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.geo-events{font-size:11px;color:var(--text2);margin-top:8px}
.geo-events li{margin-bottom:3px;padding-left:8px}

/* 헤지 바 */
.alloc-bar-wrap{display:flex;height:28px;border-radius:6px;overflow:hidden;margin:8px 0}
.alloc-seg{display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:#fff;min-width:0;overflow:hidden}
.seg-long{background:rgba(34,197,94,.7)}
.seg-sqqq{background:rgba(239,68,68,.7)}
.seg-cash{background:rgba(148,163,184,.4);color:var(--text2)}
.alloc-legend{display:flex;gap:12px;font-size:11px;flex-wrap:wrap}
.leg-long{color:var(--green)}
.leg-sqqq{color:var(--red)}
.leg-cash{color:var(--text2)}

/* TOP5 카드 */
.top5-item{background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:10px;border:1px solid var(--border)}
.top5-item.rank-1{border-color:var(--green)}
.top5-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap}
.rank-num{font-size:11px;color:var(--text2);min-width:20px}
.ticker{font-size:20px;font-weight:700;color:var(--accent)}
.top5-price{font-size:22px;font-weight:700;margin-bottom:4px}
.top5-subs{display:flex;gap:12px;font-size:11px;color:var(--text2);margin-bottom:8px}

/* Donchian 바 */
.dc-wrap{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.dc-label{font-size:10px;color:var(--text2);white-space:nowrap;min-width:60px}
.dc-label:last-child{text-align:right}
.dc-track{flex:1;height:6px;background:var(--bg2);border-radius:4px;position:relative;overflow:visible}
.dc-fill{height:100%;border-radius:4px}
.dc-marker{position:absolute;top:-4px;width:3px;height:14px;background:#fff;border-radius:2px;transform:translateX(-50%)}
.dc-pos{font-size:10px;text-align:center;font-weight:600;margin-bottom:6px}

.score-row{display:flex;flex-wrap:wrap;gap:6px}
.sc{font-size:11px;color:var(--text2)}
.sc b{color:var(--text)}

/* ══════════════════════════════
   탭2: 포트폴리오
══════════════════════════════ */
.pf-summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.pf-stat{background:var(--bg3);border-radius:8px;padding:10px 12px}
.pf-stat-label{font-size:11px;color:var(--text2);margin-bottom:2px}
.pf-stat-val{font-size:18px;font-weight:700}

.holding-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.holding-item:last-child{border:none}
.holding-ticker{font-size:16px;font-weight:700;color:var(--accent);min-width:50px}
.holding-shares{font-size:11px;color:var(--text2)}
.holding-mid{flex:1}
.holding-price{font-size:14px;font-weight:600}
.holding-pl{font-size:12px;font-weight:600}
.pos{color:var(--green)}
.neg{color:var(--red)}

.mini-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;margin-top:4px}
.mini-bar{height:4px;border-radius:2px}

/* ══════════════════════════════
   탭3: VCP / CANSLIM
══════════════════════════════ */
.screen-item{padding:10px 0;border-bottom:1px solid var(--border)}
.screen-item:last-child{border:none}
.screen-row1{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.screen-ticker{font-size:15px;font-weight:700;color:var(--accent);min-width:50px}
.screen-price{font-size:13px;font-weight:600}
.screen-row2{display:flex;gap:10px;font-size:11px;color:var(--text2)}
.vcp-tag{background:rgba(34,197,94,.15);color:var(--green);padding:1px 6px;border-radius:4px;font-size:10px;font-weight:600}
.s2-tag{background:rgba(56,189,248,.1);color:var(--accent);padding:1px 6px;border-radius:4px;font-size:10px}
.pivot-val{color:var(--yellow)}

.score-bar-wrap{height:4px;background:var(--bg3);border-radius:2px;display:inline-block;width:60px;vertical-align:middle;margin:0 4px}
.score-bar{height:4px;border-radius:2px}

/* ══════════════════════════════
   탭4: 섹터
══════════════════════════════ */
.sector-item{padding:10px 0;border-bottom:1px solid var(--border)}
.sector-item:last-child{border:none}
.sector-row1{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.sector-rank{font-size:13px;font-weight:700;color:var(--accent);min-width:22px}
.sector-name{font-size:14px;font-weight:600;flex:1}
.sector-etf{font-size:11px;color:var(--text2);background:var(--bg3);padding:1px 6px;border-radius:4px}
.sector-ret{font-size:14px;font-weight:700;min-width:54px;text-align:right}
.ret-hot{color:#22c55e}
.ret-warm{color:#f59e0b}
.ret-cold{color:#ef4444}
.ret-zero{color:var(--text2)}
.sector-bars{display:flex;gap:4px;align-items:center;margin-top:4px}
.sector-bar-label{font-size:10px;color:var(--text2);min-width:28px}
.sector-bar-track{flex:1;height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.sector-bar-fill{height:100%;border-radius:3px;transition:width .3s}
.sector-stocks{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.sector-stock-chip{background:var(--bg3);border-radius:5px;padding:3px 8px;font-size:11px;display:flex;align-items:center;gap:4px}
.macro-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.macro-chip{background:var(--bg3);border-radius:6px;padding:5px 10px;font-size:11px}
.macro-chip b{color:var(--accent)}

/* ── 인스톨 배너 */
.install-banner{background:linear-gradient(135deg,#1e3a5f,#1e293b);border:1px solid var(--accent);border-radius:var(--r);padding:12px 14px;margin-bottom:12px;display:none;align-items:center;gap:10px}
.install-banner.show{display:flex}
.install-btn{background:var(--accent);color:#0f172a;border:none;padding:8px 14px;border-radius:8px;font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap;flex-shrink:0}
.install-text{font-size:12px;color:var(--text2)}

/* ── 에러 */
.err-box{background:rgba(239,68,68,.1);border:1px solid var(--red);border-radius:8px;padding:12px;font-size:12px;color:var(--red);margin-bottom:12px}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-row">
    <div class="hdr-title">📊 Stock Dashboard</div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
      <span id="refreshIcon">↻</span> 새로고침
    </button>
  </div>
  <div class="hdr-meta">
    마지막 업데이트: <span class="hdr-date" id="lastUpdate">—</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">
    <span class="tab-icon">📈</span>추세추종
  </div>
  <div class="tab" onclick="switchTab(1)">
    <span class="tab-icon">💼</span>포트폴리오
  </div>
  <div class="tab" onclick="switchTab(2)">
    <span class="tab-icon">🔍</span>VCP/CANSLIM
  </div>
  <div class="tab" onclick="switchTab(3)">
    <span class="tab-icon">🏭</span>섹터
  </div>
</div>

<div class="content">

  <!-- ── 탭1: 추세추종 ── -->
  <div class="page active" id="page0">
    <div class="install-banner" id="installBanner">
      <div class="install-text">홈 화면에 추가하면 앱처럼 사용할 수 있어요</div>
      <button class="install-btn" id="installBtn">설치</button>
    </div>
    <div id="trendContent"><div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
  </div>

  <!-- ── 탭2: 포트폴리오 ── -->
  <div class="page" id="page1">
    <div id="pfContent"><div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
  </div>

  <!-- ── 탭3: VCP/CANSLIM ── -->
  <div class="page" id="page2">
    <div id="vcpContent"><div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
  </div>

  <!-- ── 탭4: 섹터 ── -->
  <div class="page" id="page3">
    <div id="sectorContent"><div class="loading"><span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span></div></div>
  </div>

</div>

<script>
// ── PWA 설치 프롬프트
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('installBanner').classList.add('show');
});
document.getElementById('installBtn').onclick = async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  if (outcome === 'accepted') document.getElementById('installBanner').classList.remove('show');
  deferredPrompt = null;
};

// ── Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/claude-agents/sw.js', {
    scope: '/claude-agents/',
    updateViaCache: 'none',   // 매 방문마다 sw.js 최신 버전 서버에서 확인
  }).then(reg => {
    // 새 SW가 activated되면 즉시 페이지 새로고침
    reg.addEventListener('updatefound', () => {
      const newSW = reg.installing;
      newSW.addEventListener('statechange', () => {
        if (newSW.state === 'activated') window.location.reload();
      });
    });
  }).catch(() => {});
}

// ── 포그라운드 복귀 시 데이터 자동 갱신
// Android PWA: 앱을 백그라운드에서 복귀하면 loadAll() 재실행
let _lastLoadTime = Date.now();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') {
    const elapsed = Date.now() - _lastLoadTime;
    // 5분 이상 지났으면 자동 새로고침
    if (elapsed > 5 * 60 * 1000) loadAll();
  } else {
    _lastLoadTime = Date.now();
  }
});

// ── 탭 전환
function switchTab(i) {
  document.querySelectorAll('.tab').forEach((t, j) => t.classList.toggle('active', i === j));
  document.querySelectorAll('.page').forEach((p, j) => p.classList.toggle('active', i === j));
}

// ── 진입점·손절 미니차트 (인라인 SVG)
// price: 현재가, pivot: 피벗(진입점), stop: 손절가
function miniPriceChart(price, pivot, stop) {
  if (!price || !pivot) return '';
  const W = 96, H = 28, PAD = 8;
  const lo = Math.min(stop, price, pivot) * 0.985;
  const hi = Math.max(stop, price, pivot) * 1.015;
  const rng = hi - lo || 1;
  const px = v => PAD + (v - lo) / rng * (W - PAD * 2);
  const mid = H / 2;
  const xs = px(stop), xp = px(pivot), xc = px(price);

  // 색상: 현재가가 피벗 위=진입완료(초록), 손절~피벗=대기(노랑), 손절아래=위험(빨강)
  const priceDot = price >= pivot ? '#22c55e' : price >= stop ? '#f59e0b' : '#ef4444';

  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"
      style="vertical-align:middle;flex-shrink:0" aria-label="진입:$${pivot.toFixed(0)} 손절:$${stop.toFixed(0)}">
    <!-- 배경 트랙 -->
    <line x1="${PAD}" y1="${mid}" x2="${W-PAD}" y2="${mid}" stroke="var(--border)" stroke-width="3" stroke-linecap="round"/>
    <!-- 손절~피벗 구간: 연한 노랑 -->
    <rect x="${Math.min(xs,xp)}" y="${mid-3}" width="${Math.abs(xp-xs)}" height="6" rx="2" fill="rgba(245,158,11,0.25)"/>
    <!-- 손절선 (빨강 tick) -->
    <line x1="${xs}" y1="${mid-7}" x2="${xs}" y2="${mid+7}" stroke="#ef4444" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 피벗선 (초록 tick) -->
    <line x1="${xp}" y1="${mid-7}" x2="${xp}" y2="${mid+7}" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 현재가 점 -->
    <circle cx="${xc}" cy="${mid}" r="5" fill="${priceDot}" stroke="var(--bg2)" stroke-width="2"/>
    <!-- 라벨: S / E -->
    <text x="${xs}" y="${H-1}" text-anchor="middle" font-size="8" fill="#ef4444" font-family="monospace">S</text>
    <text x="${xp}" y="${H-1}" text-anchor="middle" font-size="8" fill="#22c55e" font-family="monospace">E</text>
  </svg>`;
}

// ── 티커 링크 (TradingView)
function tvLink(ticker, display) {
  const label = display || ticker;
  // NASDAQ/NYSE 구분 없이 NASDAQ 우선, TradingView가 자동 매칭
  const url = `https://www.tradingview.com/chart/?symbol=${encodeURIComponent(ticker)}`;
  return `<a href="${url}" target="_blank" rel="noopener"
    style="color:var(--accent);text-decoration:none;border-bottom:1px dotted var(--accent)"
    onclick="event.stopPropagation()">${label}</a>`;
}

// ── 데이터 로드
const BASE = '/claude-agents';

const RAW_BASE = 'https://raw.githubusercontent.com/dhkong01/claude-agents/main/docs/';
async function fetchJSON(path) {
  // raw.githubusercontent.com 사용 — GitHub Pages CDN(Fastly) 10분 캐시 완전 우회
  const url = RAW_BASE + path + '?t=' + Date.now();
  const r = await fetch(url, { cache: 'no-store' });
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

let trendData = null, pfData = null, vcpData = null, canslimData = null, sectorData = null;
let priceLookup = {}; // 인기 종목 가격 캐시 (price_lookup.json)

// ── localStorage 포트폴리오 관리 ──────────────────────────
const PF_KEY = 'pwa_portfolio_v1';

function localPfLoad() {
  try { return JSON.parse(localStorage.getItem(PF_KEY)); } catch { return null; }
}
function localPfSave(data) {
  localStorage.setItem(PF_KEY, JSON.stringify(data));
}

// 서버에서 받은 가격 데이터(serverPf)를 기반으로 로컬 수량/평단가 적용
// → loadAll()이 이미 받은 데이터를 직접 넘겨 이중 fetch 없이 동작
function applyLocalPortfolio(serverPf) {
  const local = localPfLoad();
  if (!local || !local.holdings?.length) return false;

  // ticker → price 맵 구성 (서버 데이터)
  const priceMap = {};
  (serverPf?.holdings || []).forEach(h => {
    if (h.ticker && h.price) priceMap[h.ticker] = h.price;
  });

  const holdings = local.holdings.map(h => {
    // 서버 가격 → price_lookup → 수동 입력 → 0
    const price = priceMap[h.ticker] || priceLookup[h.ticker] || h.manual_price || 0;
    const cost  = +(h.avg_cost * h.shares).toFixed(2);
    const value = +(price     * h.shares).toFixed(2);
    return { ticker: h.ticker, shares: h.shares, avg_cost: h.avg_cost,
             manual_price: h.manual_price || 0,
             price, value, cost };
  });

  pfData = {
    date:           serverPf?.date || new Date().toISOString().slice(0,10),
    holdings,
    total_cost:     +holdings.reduce((s,h)=>s+h.cost,0).toFixed(2),
    next_rebalance: local.next_rebalance || serverPf?.next_rebalance || '—',
    _local:         true,
  };
  return true;
}

async function loadAll() {
  const icon = document.getElementById('refreshIcon');
  icon.classList.add('spin');
  try {
    const results = await Promise.allSettled([
      fetchJSON('data/trend_latest.json'),
      fetchJSON('data/portfolio_latest.json'),
      fetchJSON('data/vcp_top20.json'),
      fetchJSON('data/canslim_top10.json'),
      fetchJSON('data/sector_latest.json'),
      fetchJSON('data/price_lookup.json'),
    ]).then(r => r.map(x => x.status === 'fulfilled' ? x.value : null));
    [trendData, pfData, vcpData, canslimData, sectorData] = results;
    if (results[5]?.prices) priceLookup = results[5].prices;

    // localStorage 포트폴리오가 있으면 서버 가격(pfData) + 로컬 수량/평단가로 덮어씀
    if (localPfLoad()) applyLocalPortfolio(pfData);

    renderTrend();
    renderPortfolio();
    renderVCP();
    renderSector();

    const date = trendData?.date || pfData?.date || '—';
    // 2일 이상 지연 시 경고 표시
    let dateLabel = date;
    if (date && date !== '—') {
      const diffDays = Math.floor((new Date() - new Date(date)) / 86400000);
      if (diffDays >= 2) dateLabel = `${date} ⚠️ ${diffDays}일 지연`;
    }
    document.getElementById('lastUpdate').textContent = dateLabel;
  } catch(e) {
    console.error(e);
  } finally {
    icon.classList.remove('spin');
  }
}

// 탭1: 추세추종 렌더
// ════════════════════════════════════
function renderTrend() {
  const el = document.getElementById('trendContent');
  if (!trendData) {
    el.innerHTML = '<div class="err-box">데이터를 불러올 수 없습니다. GitHub Actions가 아직 실행되지 않았을 수 있습니다.</div>';
    return;
  }

  const geo   = trendData.geo_risk || {};
  const top5  = trendData.top5 || [];
  const sqqq  = trendData.sqqq_channel || {};
  const hedge = geo.hedge || {};
  const mode  = trendData.mode || 'weekly';

  el.innerHTML = `
    ${renderGeo(geo)}
    ${renderHedge(hedge, sqqq)}
    ${renderTop5(top5)}
    ${renderTracking(trendData.tracking || [])}
  `;
}

function renderGeo(geo) {
  const level  = geo.risk_level || '?';
  const score  = geo.risk_score || 0;
  const bias   = geo.market_bias || '?';
  const events = geo.top_risk_events || [];
  const color  = level === 'HIGH' ? 'var(--red)' : level === 'LOW' ? 'var(--green)' : 'var(--yellow)';
  const badgeCls = level === 'HIGH' ? 'bg-red' : level === 'LOW' ? 'bg-green' : 'bg-yellow';
  // RISK_ON = 위험선호(공격적 매수), RISK_OFF = 위험회피(방어·현금)
  const biasLabel = bias === 'RISK_ON'  ? '🟢 위험선호 (공격적 투자)' :
                    bias === 'RISK_OFF' ? '🔴 위험회피 (방어·현금 확대)' : '🟡 중립';
  const biasCls   = bias === 'RISK_ON'  ? 'bg-green' :
                    bias === 'RISK_OFF' ? 'bg-red'   : 'bg-yellow';

  const pct = score / 10;
  const circ = Math.PI * 36; // ~113
  const dashOff = circ - circ * pct;

  const evHtml = events.slice(0,3).map(e => `<li>${e}</li>`).join('') || '<li class="muted">주요 이벤트 없음</li>';

  // 점수 해석 안내
  const scoreGuide = score >= 7 ? '⚠️ 극도 위험 — 포지션 대폭 축소 권장' :
                     score >= 4 ? '⚡ 주의 구간 — 헤지 비중 확대 권장' :
                                  '✅ 안전 구간 — 정상 투자 가능';

  return `
  <div class="card">
    <div class="card-title">🌍 지정학 리스크</div>
    <div style="font-size:11px;color:var(--text2);margin:-8px 0 10px;padding:6px 10px;background:var(--bg3);border-radius:6px">
      📌 점수 높을수록 위험 ↑ → 위험회피(RISK OFF) → 방어 포지션 필요
    </div>
    <div class="geo-grid">
      <div class="gauge-wrap">
        <svg class="gauge-arc" viewBox="0 0 92 52">
          <path d="M8,46 A38,38 0 0,1 84,46" fill="none" stroke="var(--bg3)" stroke-width="10" stroke-linecap="round"/>
          <path d="M8,46 A38,38 0 0,1 84,46" fill="none" stroke="${color}" stroke-width="10"
                stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${dashOff}"/>
        </svg>
        <div class="gauge-val" style="color:${color}">${score}</div>
        <div class="gauge-sub">/ 10</div>
      </div>
      <div class="geo-info">
        <div class="geo-row">
          <span class="badge ${badgeCls}">${level === 'HIGH' ? '🔴' : level === 'LOW' ? '🟢' : '🟡'} ${level === 'HIGH' ? '고위험' : level === 'LOW' ? '저위험' : '중위험'}</span>
        </div>
        <div style="margin-top:6px">
          <span class="badge ${biasCls}" style="font-size:11px">${biasLabel}</span>
        </div>
        <div style="font-size:11px;color:var(--yellow);margin-top:8px;font-weight:600">${scoreGuide}</div>
        <div style="font-size:11px;color:var(--text2);margin-top:6px">${geo.recommendation || ''}</div>
        <ul class="geo-events" style="margin-top:8px;list-style:disc;padding-left:12px">${evHtml}</ul>
      </div>
    </div>
  </div>`;
}

function renderHedge(hedge, sqqq) {
  if (!hedge || !hedge.action || hedge.action === 'FULL_LONG') return '';
  const longP  = hedge.long_pct  || 100;
  const sqqP   = hedge.sqqq_pct  || 0;
  const cashP  = hedge.cash_pct  || 0;
  const actionMap = {
    FULL_LONG:      '전체 롱',
    LIGHT_HEDGE:    '소형 헤지',
    MODERATE_HEDGE: '중간 방어',
    DEFENSIVE:      '방어 포지션',
    MAX_DEFENSIVE:  '최대 방어',
  };
  const label = actionMap[hedge.action] || hedge.action;
  const actionColor = sqqP >= 20 ? 'var(--red)' : sqqP > 0 ? 'var(--yellow)' : 'var(--green)';
  const sqqqPrice = sqqq.current ? ` $${sqqq.current}` : '';

  return `
  <div class="card" style="border-left:3px solid var(--yellow)">
    <div class="card-title">🛡 헤지 전략 권고</div>
    <div style="font-size:16px;font-weight:700;color:${actionColor};margin-bottom:6px">${label}</div>
    <div style="font-size:12px;color:var(--text2);margin-bottom:10px">${hedge.reasoning || ''}</div>
    <div class="alloc-bar-wrap">
      ${longP ? `<div class="alloc-seg seg-long" style="width:${longP}%">${longP}% 롱</div>` : ''}
      ${sqqP  ? `<div class="alloc-seg seg-sqqq" style="width:${sqqP}%">${sqqP}% SQQQ</div>` : ''}
      ${cashP ? `<div class="alloc-seg seg-cash" style="width:${cashP}%">${cashP}% 현금</div>` : ''}
    </div>
    <div class="alloc-legend">
      <span class="leg-long">롱 ${longP}%</span>
      ${sqqP ? `<span class="leg-sqqq">SQQQ ${sqqP}%${sqqqPrice}</span>` : ''}
      ${cashP ? `<span class="leg-cash">현금 ${cashP}%</span>` : ''}
    </div>
  </div>`;
}

function renderTop5(top5) {
  if (!top5.length) return '<div class="card"><div class="empty">TOP5 데이터 없음</div></div>';

  const items = top5.map((s, i) => {
    const sig   = s.donchian_signal || 'HOLD';
    const sigCls = sig === 'BREAKOUT' ? 'bg-green' : sig === 'EXIT' ? 'bg-red' : 'bg-gray';
    const sigLbl = sig === 'BREAKOUT' ? '🚀 돌파' : sig === 'EXIT' ? '⚠ 청산' : 'HOLD';
    const cur   = s.current_price || 0;
    const upr   = s.donchian_upper || 0;
    const lwr   = s.donchian_lower || 0;
    const span  = upr - lwr;
    const pos   = span > 0 ? Math.max(0, Math.min(100, Math.round((cur - lwr) / span * 100))) : 50;
    const barC  = pos >= 90 ? '#22c55e' : pos >= 50 ? '#f59e0b' : '#ef4444';
    const distU = s.dist_to_upper_pct || 0;
    const distL = s.dist_to_lower_pct || 0;

    return `
    <div class="top5-item ${i === 0 ? 'rank-1' : ''}">
      <div class="top5-header">
        <span class="rank-num">#${i+1}</span>
        <span class="ticker">${tvLink(s.ticker)}</span>
        <span class="badge ${sigCls}">${sigLbl}</span>
        ${s.in_both ? '<span class="badge bg-gray">CS+VCP</span>' : ''}
        <span style="font-size:11px;color:var(--text2)">${s.sector || ''}</span>
      </div>
      <div class="top5-price">$${cur.toLocaleString('en', {minimumFractionDigits:2, maximumFractionDigits:2})}</div>
      <div class="top5-subs">
        <span>돌파까지 ${distU > 0 ? '-' : '+'}${Math.abs(distU).toFixed(1)}%</span>
        <span>손절까지 +${Math.abs(distL).toFixed(1)}%</span>
        ${s.pivot ? `<span style="color:var(--yellow)">Pivot $${s.pivot.toFixed(2)}</span>` : ''}
      </div>
      <div class="dc-wrap">
        <span class="dc-label">$${lwr.toFixed(1)}</span>
        <div class="dc-track">
          <div class="dc-fill" style="width:${pos}%;background:${barC}"></div>
          <div class="dc-marker" style="left:${pos}%"></div>
        </div>
        <span class="dc-label">$${upr.toFixed(1)}</span>
      </div>
      <div class="dc-pos" style="color:${barC}">채널 위치 ${pos}%</div>
      <div class="score-row">
        <span class="sc">종합 <b>${(s.final_score||0).toFixed(1)}</b></span>
        <span class="sc">RS <b>${(s.rs_rating||0).toFixed(0)}</b></span>
        <span class="sc">CANSLIM <b>${s.canslim_score||0}/70</b></span>
        <span class="sc">VCP <b>${s.vcp_score||0}/45</b></span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="card">
    <div class="card-title">🏆 Donchian TOP 5</div>
    ${items}
    <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">
      <div style="font-size:12px;color:var(--text2);margin-bottom:6px">📋 리밸런싱 플랜 (동일비중 20%)</div>
      ${top5.map((s,i) => `
        <div style="display:flex;justify-content:space-between;font-size:12px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.05)">
          <span style="color:var(--accent)">#${i+1} ${s.ticker}</span>
          <span>20%</span>
          <span style="color:var(--red)">손절 $${(s.donchian_lower||0).toFixed(2)}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

function renderTracking(tracking) {
  const exits     = tracking.filter(t => t.signal === 'EXIT');
  const breakouts = tracking.filter(t => t.signal === 'BREAKOUT');
  if (!exits.length && !breakouts.length) return '';

  return `
  <div class="card" style="border-left:3px solid var(--red)">
    <div class="card-title">⚡ 액션 필요</div>
    ${exits.length ? `<div style="margin-bottom:8px"><span class="badge bg-red">⚠ 청산신호</span> <b style="margin-left:6px">${exits.map(t=>t.ticker).join(', ')}</b></div>` : ''}
    ${breakouts.length ? `<div><span class="badge bg-green">🚀 신규진입</span> <b style="margin-left:6px">${breakouts.map(t=>t.ticker).join(', ')}</b></div>` : ''}
  </div>`;
}

function renderPortfolio() {

      </div>
      <div style="text-align:right">
        <div class="holding-pl ${cls}">${pl>=0?'+':''}${plPct.toFixed(1)}%</div>

  const localBadge = pfData._local

  el.innerHTML = `
  <div class="card">
    <div class="card-title" style="display:flex;align-items:center;justify-content:space-between">
      <span>💼 포트폴리오 현황 <span class="muted" style="font-size:11px;font-weight:400">${date}</span>${localBadge}</span>
      <button onclick="openPfEditor()" style="font-size:12px;padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text1);cursor:pointer">✏️ 편집</button>
    </div>
    <div class="pf-summary">
      <div class="pf-stat">
        <div class="pf-stat-label">평가금액</div>
        <div class="pf-stat-val" style="font-size:16px">$${Math.round(totalVal).toLocaleString()}</div>
      </div>
      <div class="pf-stat">
        <div class="pf-stat-label">총 손익</div>
        <div class="pf-stat-val ${plCls}">${totalPL>=0?'+':''}${totalPLPct.toFixed(1)}%</div>
      </div>
      <div class="pf-stat">
        <div class="pf-stat-label">투자원금</div>
        <div class="pf-stat-val" style="font-size:14px">$${Math.round(totalCost).toLocaleString()}</div>
      </div>
      <div class="pf-stat">
        <div class="pf-stat-label">다음 리밸런싱</div>
        <div class="pf-stat-val" style="font-size:13px">${nextRB}</div>
      </div>
    </div>
    <div>${holdRows}</div>
  </div>`;
}

// 탭3: VCP / CANSLIM 렌더
// ════════════════════════════════════
function renderVCP() {
  const el = document.getElementById('vcpContent');
  const vcp = vcpData?.stocks || [];
  const cs  = canslimData?.top10 || [];

  let html = '';

  // VCP
  if (vcp.length) {
    const vcpRows = vcp.map(s => {
      const tag    = s.has_vcp ? '<span class="vcp-tag">VCP ✓</span>' : '<span class="s2-tag">Stage2</span>';
      const score  = s.total_score || 0;
      const rs     = (s.rs_rating || 0).toFixed(0);
      const barW   = Math.min(100, score / 85 * 100);
      const barC   = score >= 60 ? '#22c55e' : score >= 40 ? '#f59e0b' : '#ef4444';
      const price  = s.current_price || 0;
      const pivot  = s.pivot || 0;
      // 손절: 피벗 -7% 또는 MA50 중 높은 값 (표준 O'Neil 룰)
      const stopPct = pivot * 0.93;
      const stop   = s.ma50 && s.ma50 > stopPct && s.ma50 < pivot ? s.ma50 : stopPct;
      const chart  = pivot ? miniPriceChart(price, pivot, stop) : '';
      const priceRelLabel = pivot
        ? (price >= pivot ? '<span style="color:#22c55e;font-size:10px">▲진입위</span>'
          : price >= stop  ? '<span style="color:#f59e0b;font-size:10px">대기중</span>'
          : '<span style="color:#ef4444;font-size:10px">손절권</span>')
        : '';
      return `
      <div class="screen-item">
        <div class="screen-row1">
          <span class="screen-ticker">${tvLink(s.ticker)}</span>
          ${tag}
          <span class="screen-price">$${price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</span>
          ${priceRelLabel}
        </div>
        ${pivot ? `
        <div style="margin:5px 0 2px;display:flex;align-items:center;gap:8px">
          ${chart}
          <div style="font-size:10px;color:var(--text2);line-height:1.5">
            <div><span style="color:#22c55e">E</span> 진입 $${pivot.toFixed(1)}</div>
            <div><span style="color:#ef4444">S</span> 손절 $${stop.toFixed(1)}</div>
          </div>
        </div>` : ''}
        <div class="screen-row2">
          <span>종합 <b style="color:var(--text)">${score}</b></span>
          <span>RS <b style="color:var(--text)">${rs}</b></span>
          <span>수축 ${s.contractions||0}회</span>
          <span>조정 ${s.final_depth_pct||0}%</span>
        </div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
          <div class="score-bar-wrap"><div class="score-bar" style="width:${barW}%;background:${barC}"></div></div>
          <span style="font-size:10px;color:var(--text2)">${score}/85</span>
        </div>
      </div>`;
    }).join('');

    html += `
    <div class="card">
      <div class="card-title">📈 Minervini VCP TOP 20</div>
      ${vcpRows}
    </div>`;
  }

  // CANSLIM
  if (cs.length) {
    const csRows = cs.map(s => {
      const score  = s.canslim_score || 0;
      const barW   = Math.min(100, score / 70 * 100);
      const barC   = score >= 50 ? '#22c55e' : score >= 35 ? '#f59e0b' : '#ef4444';
      const scrs   = s.scores || {};
      const detail = Object.entries(scrs).map(([k,v]) => `${k}:${v}`).join(' ');
      return `
      <div class="screen-item">
        <div class="screen-row1">
          <span class="screen-ticker">${tvLink(s.ticker)}</span>
          <span class="screen-price" style="font-size:12px">${score}/70</span>
          <span class="muted" style="font-size:11px">RS ${(s.rs_rating||0).toFixed(0)}</span>
        </div>
        <div class="screen-row2" style="font-size:10px">${detail}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px">
          <div class="score-bar-wrap"><div class="score-bar" style="width:${barW}%;background:${barC}"></div></div>
          <span style="font-size:10px;color:var(--text2)">${s.sector||''}</span>
        </div>
      </div>`;
    }).join('');

    html += `
    <div class="card">
      <div class="card-title">📊 CANSLIM TOP 10</div>
      ${csRows}
    </div>`;
  }

  if (!html) {
    html = '<div class="err-box">VCP/CANSLIM 데이터가 없습니다. GitHub Actions 실행 후 확인해 주세요.</div>';
  }

  el.innerHTML = html;
}

// 탭4: 섹터 렌더
// ════════════════════════════════════
function renderSector() {
  const el = document.getElementById('sectorContent');
  if (!sectorData) {
    el.innerHTML = '<div class="err-box">섹터 데이터가 없습니다. GitHub Actions 실행 후 확인해 주세요.</div>';
    return;
  }

  const sectors   = sectorData.sectors || [];
  const usBySec   = sectorData.us_by_sector || {};
  const macro     = sectorData.macro || {};
  const geo       = sectorData.geo_risk || {};
  const quarter   = sectorData.quarter || '';
  const date      = sectorData.date || '';

  // 수익률 색상
  function retCls(v) {
    if (v == null) return 'ret-zero';
    return v > 5 ? 'ret-hot' : v > 0 ? 'ret-warm' : v < 0 ? 'ret-cold' : 'ret-zero';
  }
  function retStr(v) {
    if (v == null) return 'N/A';
    return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
  }
  function barColor(v) {
    return (v || 0) >= 0 ? '#22c55e' : '#ef4444';
  }

  // 지정학 리스크 배지 (추세추종 탭과 동일 기준)
  const gBias  = geo.market_bias || '';
  const gLevel = geo.risk_level  || '';
  const gScore = geo.risk_score  != null ? geo.risk_score : '';
  const gBiasLabel = gBias === 'RISK_ON'  ? '🟢 위험선호 (공격적 투자)' :
                     gBias === 'RISK_OFF' ? '🔴 위험회피 (방어·현금 확대)' : '🟡 중립';
  const gBiasCls   = gBias === 'RISK_ON'  ? 'bg-green' :
                     gBias === 'RISK_OFF' ? 'bg-red'   : 'bg-yellow';
  const gLevelCls  = gLevel === 'HIGH' ? 'bg-red' : gLevel === 'LOW' ? 'bg-green' : 'bg-yellow';

  // 매크로 칩
  const macroHtml = `
  <div class="card">
    <div class="card-title">📊 분기 섹터 현황 <span class="muted" style="font-size:11px;font-weight:400">${quarter} · ${date}</span></div>
    ${gBias ? `
    <div style="margin-bottom:10px">
      <div class="badge ${gLevelCls}" style="font-size:12px;margin-bottom:4px">지정학 리스크 ${gLevel} · ${gScore}/10</div>
      <div class="badge ${gBiasCls}" style="font-size:12px">${gBiasLabel}</div>
    </div>` : ''}
    <div class="macro-chips">
      ${macro.phase ? `<div class="macro-chip">시장 모멘텀 <b>${macro.phase}</b></div>` : ''}
      ${macro.vix   ? `<div class="macro-chip">VIX <b>${macro.vix}</b></div>` : ''}
      ${macro.yield10y ? `<div class="macro-chip">10Y 금리 <b>${macro.yield10y}%</b></div>` : ''}
      ${macro.rec_sectors?.length ? `<div class="macro-chip">추천섹터 <b>${macro.rec_sectors.slice(0,3).join(' · ')}</b></div>` : ''}
    </div>
  </div>`;

  // 섹터 리스트
  const sectorItems = sectors.map(s => {
    const qtd   = s.qtd;
    const w1    = s.week1;
    const maxAbs = 25;
    const barW   = Math.min(Math.abs(qtd || 0) / maxAbs * 100, 100);
    const barW1  = Math.min(Math.abs(w1  || 0) / maxAbs * 100, 100);

    // 이 섹터의 CANSLIM 종목 칩
    const usStocks = usBySec[s.sector] || [];
    const stockChips = usStocks.slice(0, 3).map(st =>
      `<div class="sector-stock-chip">
        ${tvLink(st.ticker)}
        <span style="color:var(--text2);font-size:10px">RS${st.rs}</span>
      </div>`
    ).join('');

    return `
    <div class="sector-item">
      <div class="sector-row1">
        <span class="sector-rank">#${s.rank}</span>
        <span class="sector-name">${s.sector}</span>
        <span class="sector-etf">${s.etf}</span>
        <span class="sector-ret ${retCls(qtd)}">${retStr(qtd)}</span>
      </div>
      <div class="sector-bars">
        <span class="sector-bar-label" style="font-size:10px;color:var(--text2)">QTD</span>
        <div class="sector-bar-track">
          <div class="sector-bar-fill" style="width:${barW}%;background:${barColor(qtd)}"></div>
        </div>
        <span style="font-size:10px;color:var(--text2);min-width:44px;text-align:right">${retStr(qtd)}</span>
      </div>
      <div class="sector-bars">
        <span class="sector-bar-label" style="font-size:10px;color:var(--text2)">1주</span>
        <div class="sector-bar-track">
          <div class="sector-bar-fill" style="width:${barW1}%;background:${barColor(w1)}"></div>
        </div>
        <span style="font-size:10px;color:var(--text2);min-width:44px;text-align:right">${retStr(w1)}</span>
      </div>
      ${stockChips ? `<div class="sector-stocks">${stockChips}</div>` : ''}
    </div>`;
  }).join('');

  // 상태 요약 카드 (상위 3 / 하위 3)
  const top3    = sectors.slice(0, 3);
  const bottom3 = sectors.slice(-3).reverse();
  const summaryHtml = `
  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="margin-bottom:10px">🏆 강세 섹터 TOP 3</div>
    ${top3.map(s => `
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span><b style="color:var(--accent)">#${s.rank}</b> ${s.sector} <span style="font-size:11px;color:var(--text2)">${s.etf}</span></span>
        <span class="${retCls(s.qtd)}" style="font-weight:700">${retStr(s.qtd)}</span>
      </div>`).join('')}
    <div class="card-title" style="margin:14px 0 10px">📉 약세 섹터 BOTTOM 3</div>
    ${bottom3.map(s => `
      <div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:13px">
        <span><b style="color:var(--text2)">#${s.rank}</b> ${s.sector} <span style="font-size:11px;color:var(--text2)">${s.etf}</span></span>
        <span class="${retCls(s.qtd)}" style="font-weight:700">${retStr(s.qtd)}</span>
      </div>`).join('')}
  </div>`;

  el.innerHTML = macroHtml + summaryHtml + `
  <div class="card">
    <div class="card-title">🏭 전체 섹터 순위 (${quarter} QTD)</div>
    ${sectorItems}
  </div>`;
}

// ── 포트폴리오 편집 모달 ──────────────────────────────────
function openPfEditor() {
  // 서버(GitHub)에 있는 종목 티커 목록
  const serverTickers = new Set((pfData?.holdings || []).map(h => h.ticker));

  const local = localPfLoad() || {
    holdings: (pfData?.holdings || []).map(h => ({
      ticker: h.ticker, shares: h.shares, avg_cost: h.avg_cost
    })),
    next_rebalance: pfData?.next_rebalance || '2026-08-21'
  };

  const rows = local.holdings.map((h, i) => {
    const isNew = !serverTickers.has(h.ticker);
    // 신규 종목: 현재가 입력란 주황색 강조
    const priceStyle = isNew
      ? 'width:68px;text-align:right;border-color:#f97316;background:#fff7ed;'
      : 'width:68px;text-align:right;color:var(--text2);';
    const pricePlaceholder = isNew ? '⚡현재가 필수' : '자동';
    const priceTitle = isNew ? '서버에 없는 종목 — 현재 주가를 직접 입력하세요' : '서버에서 자동 업데이트됩니다';
    return `
    <div class="pf-edit-row" id="pfrow-${i}">
      <input class="pf-edit-in" style="width:64px;font-weight:700;text-transform:uppercase"
             placeholder="티커" value="${h.ticker}" data-i="${i}" data-f="ticker">
      <input class="pf-edit-in" style="width:56px;text-align:right"
             placeholder="수량" type="number" min="0" value="${h.shares}" data-i="${i}" data-f="shares">
      <input class="pf-edit-in" style="width:72px;text-align:right"
             placeholder="평단가$" type="number" min="0" step="0.01" value="${h.avg_cost}" data-i="${i}" data-f="avg_cost">
      <input class="pf-edit-in" style="${priceStyle}"
             placeholder="${pricePlaceholder}" type="number" min="0" step="0.01"
             value="${h.manual_price || ''}" data-i="${i}" data-f="manual_price" title="${priceTitle}"
             ${isNew ? 'data-new="1"' : ''}>
      <button onclick="pfRowDel(${i})" style="background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px">✕</button>
    </div>`;
  }).join('');

  document.getElementById('pfModal').innerHTML = `
  <div class="pf-modal-box">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <b style="font-size:16px">✏️ 포트폴리오 편집</b>
      <button onclick="closePfEditor()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--text1)">✕</button>
    </div>
    <div style="font-size:11px;color:var(--text2);margin-bottom:6px">변경사항은 이 기기에만 저장됩니다</div>
    <div style="font-size:11px;color:#f97316;background:#fff7ed;border-radius:6px;padding:6px 8px;margin-bottom:8px">
      ⚡ <b>새로 추가한 종목</b>은 현재가($)를 직접 입력해야 평가금액이 계산됩니다
    </div>
    <div style="display:flex;gap:6px;font-size:11px;color:var(--text2);padding:0 0 4px 4px">
      <span style="width:64px">티커</span>
      <span style="width:56px;text-align:right">수량</span>
      <span style="width:72px;text-align:right">평단가($)</span>
      <span style="width:68px;text-align:right">현재가($)</span>
    </div>
    <div id="pfEditRows">${rows}</div>
    <button onclick="pfRowAdd()" style="width:100%;margin-top:8px;padding:8px;background:var(--card);border:1px dashed var(--border);border-radius:8px;color:var(--accent);cursor:pointer;font-size:13px">+ 종목 추가</button>
    <div style="margin-top:10px;display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;color:var(--text2);white-space:nowrap">다음 리밸런싱</span>
      <input id="pfNextRB" class="pf-edit-in" style="flex:1" type="date" value="${local.next_rebalance}">
    </div>
    <div style="display:flex;gap:8px;margin-top:14px">
      <button onclick="pfSave()" style="flex:1;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer">저장 & 새로고침</button>
      <button onclick="pfReset()" style="padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;font-size:12px;cursor:pointer;color:var(--text2)">서버 초기화</button>
    </div>
  </div>`;
  document.getElementById('pfModal').style.display = 'flex';
}

function closePfEditor() {
  document.getElementById('pfModal').style.display = 'none';
}

function _readRows() {
  return [...document.querySelectorAll('.pf-edit-row')].map(row => {
    const mp = parseFloat(row.querySelector('[data-f="manual_price"]')?.value) || 0;
    return {
      ticker:       row.querySelector('[data-f="ticker"]').value.trim().toUpperCase(),
      shares:       parseFloat(row.querySelector('[data-f="shares"]').value) || 0,
      avg_cost:     parseFloat(row.querySelector('[data-f="avg_cost"]').value) || 0,
      manual_price: mp || undefined,
    };
  }).filter(h => h.ticker);
}

function pfRowDel(i) {
  document.getElementById(`pfrow-${i}`)?.remove();
}

// 티커 입력 후 포커스 이탈 시 price_lookup에서 자동으로 현재가 채우기
function onTickerBlur(el) {
  const ticker = el.value.trim().toUpperCase();
  if (!ticker) return;
  el.value = ticker;
  const row = el.closest('.pf-edit-row');
  const priceEl = row?.querySelector('[data-f="manual_price"]');
  if (!priceEl) return;

  const serverPrice = (pfData?.holdings || []).find(h => h.ticker === ticker)?.price;
  const lookupPrice = priceLookup[ticker];
  const found = serverPrice || lookupPrice;

  if (found) {
    priceEl.value = found;
    priceEl.style.borderColor = '#22c55e';
    priceEl.style.background = '#f0fdf4';
    priceEl.placeholder = '자동';
    priceEl.removeAttribute('data-new');
  } else {
    priceEl.style.borderColor = '#f97316';
    priceEl.style.background = '#fff7ed';
    priceEl.placeholder = '⚡직접 입력';
  }
}

function pfRowAdd() {
  const container = document.getElementById('pfEditRows');
  const i = Date.now();
  const div = document.createElement('div');
  div.className = 'pf-edit-row';
  div.id = `pfrow-${i}`;
  div.innerHTML = `
    <input class="pf-edit-in" style="width:64px;font-weight:700;text-transform:uppercase" placeholder="티커" data-i="${i}" data-f="ticker" onblur="onTickerBlur(this)">
    <input class="pf-edit-in" style="width:56px;text-align:right" placeholder="수량" type="number" min="0" data-i="${i}" data-f="shares">
    <input class="pf-edit-in" style="width:72px;text-align:right" placeholder="평단가$" type="number" min="0" step="0.01" data-i="${i}" data-f="avg_cost">
    <input class="pf-edit-in" style="width:68px;text-align:right;border-color:#f97316;background:#fff7ed;" placeholder="⚡직접 입력" type="number" min="0" step="0.01" data-i="${i}" data-f="manual_price" data-new="1" title="티커 입력 후 Tab키 → 자동으로 현재가를 찾습니다">
    <button onclick="pfRowDel(${i})" style="background:#ef4444;color:#fff;border:none;border-radius:6px;padding:4px 8px;cursor:pointer;font-size:13px">✕</button>`;
  container.appendChild(div);
  div.querySelector('[data-f="ticker"]').focus();
}

async function pfSave() {
  const holdings = _readRows();
  if (!holdings.length) return;

  // 신규 종목(data-new=1) 중 현재가 미입력 확인
  const missing = [...document.querySelectorAll('[data-new="1"]')]
    .map(el => {
      const row = el.closest('.pf-edit-row');
      return row?.querySelector('[data-f="ticker"]')?.value?.trim().toUpperCase();
    })
    .filter(t => {
      if (!t) return false;
      const h = holdings.find(x => x.ticker === t);
      return h && !h.manual_price;
    });

  if (missing.length) {
    alert(`⚡ 다음 종목의 현재가($)를 입력해 주세요:\n${missing.join(', ')}\n\n현재가를 입력해야 평가금액과 손익이 계산됩니다.`);
    return;
  }

  const nextRB = document.getElementById('pfNextRB')?.value || '2026-08-21';
  localPfSave({ holdings, next_rebalance: nextRB });
  closePfEditor();
  await loadAll();
}

function pfReset() {
  if (!confirm('서버 데이터로 초기화하면 로컬 편집 내용이 삭제됩니다. 계속하시겠어요?')) return;
  localStorage.removeItem(PF_KEY);
  closePfEditor();
  loadAll();
}

// ── 초기 로드
loadAll();
</script>
