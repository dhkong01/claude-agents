name: Trend Following — Weekly Rebalancing

on:
  schedule:
    # 주간 리밸런싱: 월요일 KST 07:30 (UTC 22:30, 일요일)
    - cron: '30 22 * * 0'
    # 일일 추적: 화~금 KST 07:30 (UTC 22:30, 월~목)
    - cron: '30 22 * * 1-4'
    # 토요일 KST 07:30 (UTC 금요일 22:30)
    - cron: '30 22 * * 5'
    # 일요일 KST 07:30 (UTC 토요일 22:30) — 기존 누락 보완
    - cron: '30 22 * * 6'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: false
        default: 'weekly'
        type: choice
        options: [weekly, daily]

permissions:
  contents: write

jobs:
  trend:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 의존성 설치
        run: pip install yfinance pandas numpy requests lxml beautifulsoup4

      - name: 실행 모드 결정
        id: mode
        run: |
          # workflow_dispatch 입력 우선, 없으면 요일 기반
          INPUT_MODE="${{ github.event.inputs.mode }}"
          if [ -n "$INPUT_MODE" ]; then
            echo "mode=$INPUT_MODE" >> $GITHUB_OUTPUT
          elif [ "$(date -u +%u)" = "7" ]; then
            # 일요일 UTC = 월요일 KST → 주간 리밸런싱
            echo "mode=weekly" >> $GITHUB_OUTPUT
          else
            # 월~금 UTC (화~토 KST) → 일일 추적
            echo "mode=daily" >> $GITHUB_OUTPUT
          fi

      - name: 추세 추종 파이프라인 실행
        env:
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          cd tools/stock_portfolio
          python trend_pipeline.py --mode ${{ steps.mode.outputs.mode }}

      - name: PWA 데이터 내보내기
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: |
          cd tools/stock_portfolio
          python export_pwa_data.py
          python export_sector_data.py
          python export_price_lookup.py

      - name: 결과 커밋
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tools/stock_portfolio/cache/ docs/data/ || true
          git diff --staged --quiet || git commit -m "trend: ${{ steps.mode.outputs.mode }} $(date -u +%Y-%m-%d)"
          git push || true

      - name: 실패 시 카카오톡 알림
        if: failure()
        env:
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: |
          python - <<'EOF'
          import os, requests

          rest_key      = os.environ.get("KAKAO_REST_API_KEY", "")
          refresh_token = os.environ.get("KAKAO_REFRESH_TOKEN", "")
          if not rest_key or not refresh_token:
              print("[Kakao] Secret 미설정 — 알림 생략")
              raise SystemExit(0)

          # 액세스 토큰 갱신
          r = requests.post("https://kauth.kakao.com/oauth/token", data={
              "grant_type": "refresh_token",
              "client_id": rest_key,
              "refresh_token": refresh_token,
          }, timeout=10)
          token = r.json().get("access_token", "")
          if not token:
              print("[Kakao] 토큰 갱신 실패:", r.text)
              raise SystemExit(0)

          msg = (
              "⚠️ [주식 파이프라인 실패]\n"
              "trend_rebalancing 워크플로가 실패했습니다.\n"
              "앱 데이터가 업데이트되지 않았을 수 있습니다.\n"
              "GitHub Actions 로그를 확인해 주세요.\n"
              "https://github.com/dhkong01/claude-agents/actions"
          )
          requests.post(
              "https://kapi.kakao.com/v2/api/talk/memo/default/send",
              headers={"Authorization": f"Bearer {token}"},
              data={"template_object": __import__('json').dumps({
                  "object_type": "text",
                  "text": msg,
                  "link": {"web_url": "https://github.com/dhkong01/claude-agents/actions"},
              })},
              timeout=10,
          )
          print("[Kakao] 실패 알림 전송 완료")
          EOF
