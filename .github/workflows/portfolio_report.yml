name: Portfolio Daily Report

on:
  schedule:
    - cron: '30 22 * * 0-5'   # UTC 22:30 = KST 07:30 (KST 월~토) — UTC 일~금이 KST 월~토 07:30
  workflow_dispatch:           # 수동 실행 가능

permissions:
  contents: write              # latest_report.txt 커밋 권한

jobs:
  report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: 의존성 설치
        run: pip install yfinance requests

      - name: 리포트 생성 + 카카오톡 전송 + Git 커밋
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
        run: python tools/stock_portfolio/github_actions/report.py
