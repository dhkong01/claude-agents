name: Lotto Weekly Prediction

on:
  schedule:
    - cron: '0 0 * * 1'   # UTC 00:00 월요일 = KST 09:00 월요일 (한국 DST 없음, 항상 +9)
  workflow_dispatch:       # Actions 탭 > Run workflow 버튼으로 수동 실행 가능

permissions:
  contents: write          # last_run.txt 커밋 → 60일 비활성 자동비활성화 방지

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 20    # ml_analyze ~3분 + 예측 ~1분 + 여유

    steps:
      # ── 1. 체크아웃 ────────────────────────────────────────────
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Python + 의존성 (캐시) ──────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: tools/lotto/requirements.txt

      - name: 의존성 설치
        run: pip install -r tools/lotto/requirements.txt

      # ── 3. Secrets 사전 확인 ───────────────────────────────────
      - name: Kakao Secrets 확인
        env:
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: |
          if [ -z "$KAKAO_REST_API_KEY" ] && [ -z "$TELEGRAM_BOT_TOKEN" ]; then
            echo "ERROR: KAKAO_REST_API_KEY 또는 TELEGRAM_BOT_TOKEN 이 설정되지 않았습니다."
            echo "GitHub Settings > Secrets > Actions 에서 등록하세요."
            exit 1
          fi
          if [ -n "$KAKAO_REST_API_KEY" ] && [ -z "$KAKAO_REFRESH_TOKEN" ]; then
            echo "ERROR: KAKAO_REST_API_KEY 는 있지만 KAKAO_REFRESH_TOKEN 이 없습니다."
            exit 1
          fi
          echo "Secrets OK"

      # ── 4. 파이프라인 실행 ─────────────────────────────────────
      - name: 데이터 수집 (smok95 API → 최근 200회)
        run: python tools/lotto/collect.py

      - name: 통계 정규화
        run: python tools/lotto/normalize.py

      - name: ML 정합성 분석 (3모델 × 5000회 부트스트랩)
        run: python tools/lotto/ml_analyze.py

      - name: 5게임 예측 (Game1 전수탐색 + Game2~5 온도MC)
        run: python tools/lotto/predict.py

      # ── 5. 알림 전송 ──────────────────────────────────────────
      - name: 카카오톡 / Telegram 전송
        env:
          TELEGRAM_BOT_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:    ${{ secrets.TELEGRAM_CHAT_ID }}
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python tools/lotto/github_actions/send_notify.py

      # ── 6. 실행 기록 커밋 (60일 비활성화 방지) ──────────────────
      - name: 마지막 실행 기록 저장
        run: |
          echo "$(date -u '+%Y-%m-%d %H:%M UTC')" > tools/lotto/last_run.txt
          git config user.email "github-actions@github.com"
          git config user.name  "github-actions[bot]"
          git add tools/lotto/last_run.txt
          git commit -m "chore(lotto): 실행 기록 $(date -u '+%Y-%m-%d')" || echo "변경 없음 — 커밋 생략"
          git push || echo "push 생략 (변경 없음)"
